# Healthcare thesis — CONCIERGE MEDICINE in large, high-wealth metros.
# Deliberately selective: concierge / direct-primary-care / membership / executive-health
# practices only, and (geo.require) only in top wealth metros. This narrows hard on purpose.
# Seed default for the 'healthcare' account; editable live in the DB after seeding.
slug: healthcare
name: "Concierge Medicine"
owner_email: null

size:
  ebitda_min: 500000
  ebitda_max: 6000000
  sde_min: 750000
  reject_below_ask: 750000

keywords:
  # A single tier-1 hit = a concierge / membership / executive-health practice.
  tier1:
    - concierge medicine
    - concierge physician
    - concierge doctor
    - concierge practice
    - concierge primary care
    - concierge family medicine
    - concierge internal medicine
    - direct primary care
    - dpc practice
    - membership medicine
    - membership-based practice
    - membership medical practice
    - retainer medicine
    - retainer-based practice
    - boutique medical practice
    - boutique primary care
    - boutique family practice
    - executive health
    - executive physical
    - executive medicine
    - executive wellness
    - longevity clinic
    - longevity medicine
    - precision health
    - private physician practice
    - personalized primary care
    - personalized medicine
    - vip medical
    - medical concierge
  # Tier-2 counts ONLY with a concierge/membership context word — catches practices
  # that are membership-based without using the exact phrase "concierge medicine".
  tier2:
    - primary care
    - family medicine
    - internal medicine
    - general practice
    - medical practice
    - physician practice
    - wellness clinic
    - med practice
  context:
    - concierge
    - membership
    - retainer
    - boutique
    - executive
    - longevity
    - private
    - personalized
    - subscription
    - vip
  negative:
    - urgent care
    - hospital
    - med spa
    - medical spa
    - weight loss
    - dialysis
    - hospice
    - home health
    - nursing home
    - skilled nursing
    - franchise
    - chiropractic

geo:
  # require: qualify ONLY in a target metro/state. Off-metro and unplaceable deals are
  # held out of the board (section 'off_geo') — they feed the detail-screening queue.
  require: true
  tier1_metros: [new york, manhattan, brooklyn, los angeles, san francisco, san jose,
    palo alto, beverly hills, santa monica, newport beach, boston, cambridge, miami,
    miami beach, palm beach, naples, chicago, seattle, washington dc, greenwich,
    scottsdale, austin, dallas, houston, denver, aspen]
  tier2_states: [NY, CA, MA, FL, IL, DC, WA, CT, CO, AZ, TX, NJ]

categories:
  exclude: []

flags:
  positive: [geo_t1, geo_t2, margin_gt_20, owner_retiring, recurring_40]
  negative: [low_margin_lt_15, overpriced, franchise_resale, partial]

ranking:
  weights: {relevance: 2.0, flag_score: 1.0}
