# Healthcare thesis — PRIMARY CARE CLINICS in large, high-wealth metros.
# Family medicine / internal medicine / general practice / pediatric / urgent-care /
# community-health clinics. exclude_terms hard-drops adjacent-but-wrong businesses
# (dental, vet, optical, imaging, PT, etc.); geo.require focuses on top wealth metros.
# Seed default for the 'healthcare' account; editable live in the DB after seeding.
slug: healthcare
name: "Primary Care Clinics"
owner_email: null

size:
  ebitda_min: 500000
  ebitda_max: 6000000
  sde_min: 750000
  reject_below_ask: 750000

keywords:
  # A single tier-1 hit = a primary-care clinic/practice.
  tier1:
    - primary care
    - primary care clinic
    - primary care practice
    - primary care group
    - primary care physician
    - family medicine
    - family practice
    - family medical
    - internal medicine
    - general practice
    - general practitioner
    - pediatric clinic
    - pediatric practice
    - pediatrics practice
    - pediatric medical
    - community health center
    - federally qualified health center
    - fqhc
    - urgent care
    - walk-in clinic
    - walk in clinic
    - physician group
    - medical group
    - concierge medicine
    - direct primary care
    - multispecialty clinic
    - multi-specialty clinic
  tier2:
    - family health
    - health center
    - wellness clinic
    - medical clinic
  context:
    - primary care
    - family
    - pediatric
    - internal medicine
    - physician
    - patients
    - outpatient
    - clinic
  negative: []
  # Hard exclude: any match removes the listing from this thesis regardless of keyword hits.
  exclude_terms:
    - dental
    - dentist
    - orthodont
    - endodont
    - periodont
    - oral surgery
    - ophthalm
    - optical
    - optometr
    - eye care
    - vision center
    - veterinary
    - vet clinic
    - animal hospital
    - chiropract
    - dermatolog
    - plastic surgery
    - cosmetic surgery
    - physical therapy
    - occupational therapy
    - dialysis
    - hospice
    - nursing home
    - skilled nursing
    - assisted living
    - med spa
    - medical spa
    - weight loss
    - pharmacy
    - medical device
    - medical billing
    - imaging center
    - diagnostic imaging
    - radiology
    - laboratory

geo:
  # require: qualify ONLY in a target metro/state. Off-metro and unplaceable deals are
  # held out (section 'off_geo'). Set require:false to score primary care nationwide.
  require: false
  tier1_metros: [new york, manhattan, brooklyn, los angeles, san francisco, san jose,
    palo alto, beverly hills, santa monica, newport beach, boston, cambridge, miami,
    miami beach, palm beach, naples, chicago, seattle, washington dc, greenwich,
    scottsdale, austin, dallas, houston, denver, aspen]
  tier2_states: [NY, CA, MA, FL, IL, DC, WA, CT, CO, AZ, TX, NJ]

categories:
  exclude: []

flags:
  positive: [geo_t1, geo_t2, margin_gt_20, owner_retiring, recurring_40]
  negative: [low_margin_lt_15, overpriced, franchise_resale, partial]

ranking:
  weights: {relevance: 2.0, flag_score: 1.0}
